spring.datasource.url=jdbc:postgresql://localhost:5432/whatsapp_clone
spring.datasource.username=username
spring.datasource.password=password

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database=postgresql
spring.jpa.database-platform= org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=false

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/whatsapp-clone

spring.servlet.multipart.max-file-size=50MB

application.file.uploads.media-output.path=./uploads

springdoc.default-produces-media-type=application/json